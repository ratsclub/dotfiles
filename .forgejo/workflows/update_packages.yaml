name: Update Packages

run-name: "Update Packages"

on:
  workflow_dispatch:
  schedule:
    # run every monday
    - cron: '0 0 * * 1'

jobs:
  update:
    runs-on: docker

    steps:
      - name: Checkout
        # This job always updates packages on master: it branches off master and
        # opens PRs against it (see scripts/update-packages.sh), so it clones
        # master directly rather than the triggering ref.
        run: |
          git clone --depth=1 --branch master \
            "https://x-access-token:${{ secrets.TOKEN }}@$FORGEJO_DOMAIN/${{ forgejo.repository }}" .

      - name: Configure git
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "noreply@r6b.dev"

      - name: CI shell check
        run: nix develop .#ci --check

      - name: Update packages
        env:
          FORGEJO_TOKEN: ${{ secrets.TOKEN }}
          FORGEJO_SERVER_URL: ${{ github.server_url }}
          FORGEJO_REPOSITORY: ${{ github.repository }}
        run: nix develop .#ci -c bash scripts/update-packages.sh
