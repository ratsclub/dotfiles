name: Check Nix Flake

run-name: "Check Nix Flake"

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Install sudo
        # The default Forgejo runner image runs as root but ships no sudo,
        # which install-nix-action requires.
        run: apt-get update && apt-get install -y sudo
      - name: Install Nix
        uses: actions/install-nix-action@v31
      - name: Check formatting
        run: nix fmt -- --ci
      - name: Run nix flake check
        # --impure lets the devenv-based devShell resolve its working directory.
        run: nix flake check --impure
